- name: Ensure app directory exists
  file:
    path: /opt/weather-api
    state: directory
    mode: "0755"

- name: Copy docker compose file
  copy:
    src: compose.yaml
    dest: /opt/weather-api/compose.yaml
    mode: "0644"

- name: Start weather API with Docker Compose
  command: docker compose -f /opt/weather-api/compose.yaml up -d

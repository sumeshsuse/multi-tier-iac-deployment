name: Deploy Dev

on:
  workflow_dispatch:


jobs:
  deploy-dev:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform init (dev)
      working-directory: terraform/dev
      env:
        TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
        TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        TF_VAR_server_type: ${{ vars.DEV_SERVER_TYPE }}
        TF_VAR_server_image: ${{ vars.DEV_SERVER_IMAGE }}
        TF_VAR_server_location: ${{ vars.DEV_SERVER_LOCATION }}
        TF_VAR_api_servers: ${{ vars.DEV_API_SERVERS }}
      run: terraform init -input=false

    - name: Terraform validate
      working-directory: terraform/dev
      env:
        TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
        TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        TF_VAR_server_type: ${{ vars.DEV_SERVER_TYPE }}
        TF_VAR_server_image: ${{ vars.DEV_SERVER_IMAGE }}
        TF_VAR_server_location: ${{ vars.DEV_SERVER_LOCATION }}
        TF_VAR_api_servers: ${{ vars.DEV_API_SERVERS }}
      run: terraform validate

    - name: Terraform plan
      working-directory: terraform/dev
      env:
        TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
        TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        TF_VAR_server_type: ${{ vars.DEV_SERVER_TYPE }}
        TF_VAR_server_image: ${{ vars.DEV_SERVER_IMAGE }}
        TF_VAR_server_location: ${{ vars.DEV_SERVER_LOCATION }}
        TF_VAR_api_servers: ${{ vars.DEV_API_SERVERS }}
      run: terraform plan -input=false

    - name: Terraform apply
      working-directory: terraform/dev
      env:
        TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
        TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        TF_VAR_server_type: ${{ vars.DEV_SERVER_TYPE }}
        TF_VAR_server_image: ${{ vars.DEV_SERVER_IMAGE }}
        TF_VAR_server_location: ${{ vars.DEV_SERVER_LOCATION }}
        TF_VAR_api_servers: ${{ vars.DEV_API_SERVERS }}
      run: terraform apply -input=false -auto-approve

    - name: Terraform output
      working-directory: terraform/dev
      run: terraform output -json > tfoutput.json

    - name: Upload terraform outputs
      uses: actions/upload-artifact@v4
      with:
        name: tf-output
        path: terraform/dev/tfoutput.json

    - name: Install jq
      run: |
        sudo apt-get update
        sudo apt-get install -y jq

    - name: Generate Ansible inventory
      run: |
        API1=$(jq -r '.dev_server_ips.value["dev-api-1"]' terraform/dev/tfoutput.json)
        API2=$(jq -r '.dev_server_ips.value["dev-api-2"]' terraform/dev/tfoutput.json)
        DB=$(jq -r '.db_server_ip.value' terraform/dev/tfoutput.json)

        mkdir -p ansible/inventory

        cat > ansible/inventory/dev.ini <<EOF
        [api]
        dev-api-1 ansible_host=$API1 ansible_user=root
        dev-api-2 ansible_host=$API2 ansible_user=root

        [db]
        dev-db-1 ansible_host=$DB ansible_user=root

        [all:vars]
        ansible_ssh_private_key_file=~/.ssh/id_ed25519
        EOF

        cat ansible/inventory/dev.ini

    - name: Install Ansible
      run: |
        sudo apt-get update
        sudo apt-get install -y ansible

    - name: Setup SSH key
      run: |
        mkdir -p ~/.ssh
        cat > ~/.ssh/id_ed25519 <<'EOF'
        ${{ secrets.SSH_PRIVATE_KEY }}
        EOF
        chmod 600 ~/.ssh/id_ed25519

        ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null

        awk -F'ansible_host=' '/ansible_host=/ {print $2}' ansible/inventory/dev.ini | awk '{print $1}' | xargs -I{} ssh-keyscan -H {} >> ~/.ssh/known_hosts

    - name: Test Ansible connectivity
      working-directory: ansible
      run: ansible -i inventory/dev.ini all -m ping

    - name: Run Ansible playbook
      working-directory: ansible
      run: ansible-playbook -i inventory/dev.ini playbooks/site.yml

    - name: Verify application through load balancer
      run: |
        LB_IP=$(jq -r '.dev_load_balancer_ip.value' terraform/dev/tfoutput.json)

        curl --fail "http://$LB_IP/health"
        curl --fail "http://$LB_IP/weather"

name: Deploy Dev

on:
  workflow_dispatch:


jobs:
  deploy-dev:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform init (dev)
      working-directory: terraform/dev
      env:
        TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
        TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        TF_VAR_server_type: ${{ secrets.TF_VAR_SERVER_TYPE }}
        TF_VAR_server_image: ${{ secrets.TF_VAR_SERVER_IMAGE }}
        TF_VAR_server_location: ${{ secrets.TF_VAR_SERVER_LOCATION }}
        TF_VAR_api_servers: ${{ secrets.TF_VAR_API_SERVERS }}
      run: terraform init

    - name: Terraform validate
      working-directory: terraform/dev
      env:
        TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
        TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        TF_VAR_server_type: ${{ secrets.TF_VAR_SERVER_TYPE }}
        TF_VAR_server_image: ${{ secrets.TF_VAR_SERVER_IMAGE }}
        TF_VAR_server_location: ${{ secrets.TF_VAR_SERVER_LOCATION }}
        TF_VAR_api_servers: ${{ secrets.TF_VAR_API_SERVERS }}
      run: terraform validate

    - name: Terraform plan
      working-directory: terraform/dev
      env:
        TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
        TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        TF_VAR_server_type: ${{ secrets.TF_VAR_SERVER_TYPE }}
        TF_VAR_server_image: ${{ secrets.TF_VAR_SERVER_IMAGE }}
        TF_VAR_server_location: ${{ secrets.TF_VAR_SERVER_LOCATION }}
        TF_VAR_api_servers: ${{ secrets.TF_VAR_API_SERVERS }}
      run: terraform plan -input=false

    - name: Terraform apply
      working-directory: terraform/dev
      env:
        TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
        TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        TF_VAR_server_type: ${{ secrets.TF_VAR_SERVER_TYPE }}
        TF_VAR_server_image: ${{ secrets.TF_VAR_SERVER_IMAGE }}
        TF_VAR_server_location: ${{ secrets.TF_VAR_SERVER_LOCATION }}
        TF_VAR_api_servers: ${{ secrets.TF_VAR_API_SERVERS }}
      run: terraform apply -input=false -auto-approve

    - name: Terraform output
      working-directory: terraform/dev
      run: terraform output -json > tfoutput.json

    - name: Upload terraform outputs
      uses: actions/upload-artifact@v4
      with:
        name: tf-output
        path: terraform/dev/tfoutput.json

    - name: Generate Ansible inventory
      run: |
        sudo apt-get update
        sudo apt-get install -y jq

        API1=$(jq -r '.dev_server_ips.value["dev-api-1"]' terraform/dev/tfoutput.json)
        API2=$(jq -r '.dev_server_ips.value["dev-api-2"]' terraform/dev/tfoutput.json)
        DB=$(jq -r '.db_server_ip.value' terraform/dev/tfoutput.json)

        cat > ansible/inventory/dev.ini <<EOF
        [api]
        dev-api-1 ansible_host=$API1 ansible_user=root
        dev-api-2 ansible_host=$API2 ansible_user=root

        [db]
        dev-db-1 ansible_host=$DB ansible_user=root
        EOF

        cat ansible/inventory/dev.ini

    - name: Install Ansible
      run: |
        sudo apt-get update
        sudo apt-get install -y ansible

    - name: Configure SSH key for Ansible
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan -H $(awk '/ansible_host/ {print $2}' ansible/inventory/dev.ini | cut -d= -f2) >> ~/.ssh/known_hosts

    - name: Test Ansible connectivity
      working-directory: ansible
      run: ansible -i inventory/dev.ini all -m ping

    - name: Run Ansible playbook
      working-directory: ansible
      run: ansible-playbook -i inventory/dev.ini playbooks/site.yml
